<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 发布二手商品</title>
  <link href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .form-section { background:#fff; border-radius:12px; padding:32px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    .tip-card { background:#f5f7fa; border-radius:12px; padding:24px; }
    .tip-card h4 { font-size:15px; font-weight:600; margin-bottom:12px; }
    .tip-card li { font-size:13px; color:#4e5969; line-height:1.8; padding-left:12px; position:relative; }
    .tip-card li::before { content:'•'; position:absolute; left:0; color:#2d8cf0; }
    .upload-area { border:2px dashed #e5e6eb; border-radius:8px; padding:40px; text-align:center; cursor:pointer; transition:border-color 0.2s; background:#fafafa; }
    .upload-area:hover { border-color:#2d8cf0; }
  </style>
</head>
<body>
  <div id="app">
    <header class="top-header">
      <div class="container">
        <a href="index.html" class="logo">校园轻集市</a>
        <div class="header-search"><el-input v-model="keyword" placeholder="搜索..." prefix-icon="Search" clearable></el-input></div>
        <div class="header-actions">
          <a href="messages.html"><el-badge :value="3"><el-button :icon="'ChatDotSquare'" circle></el-button></el-badge></a>
          <a href="profile.html"><el-avatar :size="36" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop&crop=face"></el-avatar></a>
        </div>
      </div>
    </header>
    <div class="category-nav">
      <div class="container">
        <el-breadcrumb>
          <el-breadcrumb-item><a href="publish.html">发布信息</a></el-breadcrumb-item>
          <el-breadcrumb-item>发布二手商品</el-breadcrumb-item>
        </el-breadcrumb>
      </div>
    </div>
    <main class="page-main">
      <div class="container">
        <div class="form-layout">
          <div class="form-section">
            <h2 style="font-size:20px;font-weight:700;margin-bottom:24px;">发布二手商品</h2>
            <el-steps :active="1" simple style="margin-bottom:32px;">
              <el-step title="填写信息" icon="Edit"></el-step>
              <el-step title="确认发布" icon="Select"></el-step>
              <el-step title="发布成功" icon="Check"></el-step>
            </el-steps>
            <el-form label-position="top">
              <el-form-item label="商品名称">
                <el-input placeholder="例：出闲置教材《软件工程导论》，九成新" size="large"></el-input>
              </el-form-item>
              <el-row :gutter="20">
                <el-col :span="12">
                  <el-form-item label="分类">
                    <el-select style="width:100%;" placeholder="选择分类" size="large">
                      <el-option label="教材教辅" value="books"></el-option>
                      <el-option label="数码电子" value="digital"></el-option>
                      <el-option label="生活用品" value="daily"></el-option>
                      <el-option label="交通工具" value="transport"></el-option>
                      <el-option label="其他" value="other"></el-option>
                    </el-select>
                  </el-form-item>
                </el-col>
                <el-col :span="12">
                  <el-form-item label="成色">
                    <el-select style="width:100%;" placeholder="选择成色" size="large">
                      <el-option label="全新" value="new"></el-option>
                      <el-option label="九成新" value="90"></el-option>
                      <el-option label="八成新" value="80"></el-option>
                      <el-option label="七成新" value="70"></el-option>
                      <el-option label="五成新及以下" value="50"></el-option>
                    </el-select>
                  </el-form-item>
                </el-col>
              </el-row>
              <el-row :gutter="20">
                <el-col :span="12">
                  <el-form-item label="价格（元）">
                    <el-input placeholder="例：25" size="large">
                      <template #prefix>¥</template>
                    </el-input>
                  </el-form-item>
                </el-col>
                <el-col :span="12">
                  <el-form-item label="交易地点">
                    <el-select style="width:100%;" placeholder="选择校区" size="large">
                      <el-option label="校本部" value="main"></el-option>
                      <el-option label="东校区" value="east"></el-option>
                      <el-option label="西校区" value="west"></el-option>
                    </el-select>
                  </el-form-item>
                </el-col>
              </el-row>
              <el-form-item label="联系方式">
                <el-input placeholder="手机号或微信" size="large"></el-input>
              </el-form-item>
              <el-form-item label="商品图片">
                <div class="upload-area">
                  <el-icon style="font-size:48px;color:#86909c;"><Plus /></el-icon>
                  <p style="color:#86909c;margin-top:8px;">点击或拖拽上传图片（最多 9 张）</p>
                  <p style="font-size:12px;color:#c9cdd4;">支持 JPG / PNG，单张不超过 5MB</p>
                </div>
              </el-form-item>
              <el-form-item label="详细描述">
                <el-input type="textarea" :rows="5" placeholder="请描述商品的使用情况、购买时间、转让原因等，描述越详细越容易成交"></el-input>
              </el-form-item>
              <el-form-item>
                <el-checkbox>我已阅读并同意 <a href="#" style="color:#2d8cf0;">《发布须知》</a></el-checkbox>
              </el-form-item>
              <div style="display:flex;gap:12px;">
                <el-button type="primary" size="large" style="width:160px;">提交发布</el-button>
                <el-button size="large">保存草稿</el-button>
              </div>
            </el-form>
          </div>
          <div>
            <div class="tip-card">
              <h4>💡 发布提示</h4>
              <ul style="list-style:none;padding:0;">
                <li>真实清晰的商品图片更能吸引买家</li>
                <li>建议如实描述成色和缺陷</li>
                <li>合理定价更容易成交</li>
                <li>交易地点建议选在校园公共区域</li>
                <li>发布后可在「我的发布」中管理</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="footer"><p>校园轻集市 · 高保真原型 · 仅供教学演示</p></div>
  </div>
  <script>
    const { createApp, ref } = Vue
    const app = createApp({
      setup() {
        const keyword = ref('')
        return { keyword }
      }
    })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>
