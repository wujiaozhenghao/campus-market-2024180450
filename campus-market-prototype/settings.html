<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 账号设置</title>
  <link href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .settings-card { background:#fff; border-radius:12px; padding:32px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    .settings-card+.settings-card { margin-top:16px; }
    .settings-card h3 { font-size:16px; font-weight:600; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid #f2f3f5; }
  </style>
</head>
<body>
  <div id="app">
    <header class="top-header">
      <div class="container">
        <a href="index.html" class="logo">校园轻集市</a>
        <div class="header-search"><el-input v-model="keyword" placeholder="搜索..." prefix-icon="Search" clearable></el-input></div>
        <div class="header-actions">
          <a href="messages.html"><el-badge :value="3"><el-button :icon="'ChatDotSquare'" circle></el-button></el-badge></a>
          <a href="profile.html"><el-avatar :size="36" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop&crop=face"></el-avatar></a>
        </div>
      </div>
    </header>
    <main class="page-main">
      <div class="container" style="max-width:800px;">
        <h1 style="font-size:24px;font-weight:700;margin-bottom:24px;">账号设置</h1>
        <div class="settings-card">
          <h3>个人资料</h3>
          <el-form label-position="top">
            <div style="display:flex;align-items:center;gap:24px;margin-bottom:24px;">
              <el-avatar :size="64" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop&crop=face"></el-avatar>
              <el-button size="small">更换头像</el-button>
            </div>
            <el-row :gutter="20">
              <el-col :span="12"><el-form-item label="昵称"><el-input value="张三" size="large"></el-input></el-form-item></el-col>
              <el-col :span="12"><el-form-item label="手机号"><el-input value="138****5678" size="large" disabled></el-input></el-form-item></el-col>
            </el-row>
            <el-row :gutter="20">
              <el-col :span="12"><el-form-item label="学院"><el-input value="信息学院" size="large"></el-input></el-form-item></el-col>
              <el-col :span="12"><el-form-item label="年级"><el-select style="width:100%;" value="大三" size="large"><el-option label="大一" value="1"></el-option><el-option label="大二" value="2"></el-option><el-option label="大三" value="3"></el-option><el-option label="大四" value="4"></el-option></el-select></el-form-item></el-col>
            </el-row>
            <el-form-item label="个人简介"><el-input type="textarea" :rows="3" value="信息学院大三学生，热爱科技与生活"></el-input></el-form-item>
            <el-button type="primary" size="large">保存修改</el-button>
          </el-form>
        </div>
        <div class="settings-card">
          <h3>账号安全</h3>
          <el-form label-position="top">
            <el-row :gutter="20">
              <el-col :span="12"><el-form-item label="当前密码"><el-input type="password" size="large"></el-input></el-form-item></el-col>
              <el-col :span="12"><el-form-item label="新密码"><el-input type="password" size="large"></el-input></el-form-item></el-col>
            </el-row>
            <el-form-item label="确认新密码"><el-input type="password" size="large"></el-input></el-form-item>
            <el-button type="primary" size="large">修改密码</el-button>
          </el-form>
        </div>
        <div class="settings-card">
          <h3>通知设置</h3>
          <el-form>
            <el-form-item><el-switch v-model="notifyMsg" active-text="新消息通知"></el-switch></el-form-item>
            <el-form-item><el-switch v-model="notifyComment" active-text="动态提醒"></el-switch></el-form-item>
            <el-form-item><el-switch v-model="notifySystem" active-text="系统通知"></el-switch></el-form-item>
          </el-form>
        </div>
      </div>
    </main>
    <div class="footer"><p>校园轻集市 · 高保真原型 · 仅供教学演示</p></div>
  </div>
  <script>
    const { createApp, ref } = Vue
    const app = createApp({
      setup() {
        const keyword = ref('')
        const notifyMsg = ref(true); const notifyComment = ref(true); const notifySystem = ref(true)
        return { keyword, notifyMsg, notifyComment, notifySystem }
      }
    })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>
