<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 个人中心</title>
  <link href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .profile-header { background:#fff; border-radius:12px; padding:32px; box-shadow:0 2px 12px rgba(0,0,0,0.06); display:flex; gap:24px; align-items:center; }
    .profile-stats { display:flex; gap:48px; margin-left:auto; }
    .profile-stats .stat { text-align:center; }
    .profile-stats .stat .num { font-size:24px; font-weight:700; }
    .profile-stats .stat .label { font-size:13px; color:#86909c; }
    .menu-card { background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.06); overflow:hidden; }
    .menu-item { display:flex; align-items:center; gap:12px; padding:16px 24px; cursor:pointer; transition:background 0.2s; border-bottom:1px solid #f2f3f5; }
    .menu-item:hover { background:#f5f7fa; }
    .menu-item:last-child { border-bottom:none; }
    .menu-item .icon { font-size:20px; }
    .menu-item .info { flex:1; }
    .menu-item .info h4 { font-size:15px; font-weight:600; }
    .menu-item .info p { font-size:13px; color:#86909c; }
    .activity-card { padding:20px; border-bottom:1px solid #f2f3f5; }
    .activity-card:last-child { border-bottom:none; }
    .activity-card .time { font-size:12px; color:#c9cdd4; }
  </style>
</head>
<body>
  <div id="app">
    <header class="top-header">
      <div class="container">
        <a href="index.html" class="logo">校园轻集市</a>
        <div class="header-search"><el-input v-model="keyword" placeholder="搜索..." prefix-icon="Search" clearable></el-input></div>
        <div class="header-actions">
          <el-button type="primary" size="default" @click="goPublish">发布信息</el-button>
          <a href="messages.html"><el-badge :value="3"><el-button :icon="'ChatDotSquare'" circle></el-button></el-badge></a>
        </div>
      </div>
    </header>
    <main class="page-main">
      <div class="container" style="max-width:960px;">
        <div class="profile-header">
          <el-avatar :size="72" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop&crop=face"></el-avatar>
          <div>
            <h2 style="font-size:22px;font-weight:700;">张三</h2>
            <p style="color:#86909c;margin-top:4px;">校本部 · 信息学院 · 大三</p>
            <p style="margin-top:4px;"><span style="display:inline-block;padding:2px 10px;border-radius:4px;background:#e8f8f0;color:#00b578;font-size:12px;font-weight:500;">✅ 信用良好</span></p>
          </div>
          <div class="profile-stats">
            <div class="stat"><div class="num">12</div><div class="label">发布</div></div>
            <div class="stat"><div class="num">8</div><div class="label">收藏</div></div>
            <div class="stat"><div class="num">24</div><div class="label">获赞</div></div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px;">
          <!-- 左侧菜单 -->
          <div>
            <div class="menu-card">
              <a href="my-posts.html" class="menu-item">
                <span class="icon">📄</span>
                <div class="info"><h4>我的发布</h4><p>管理已发布的信息</p></div>
                <el-icon><ArrowRight /></el-icon>
              </a>
              <a href="favorites.html" class="menu-item">
                <span class="icon">❤️</span>
                <div class="info"><h4>我的收藏</h4><p>收藏的信息列表</p></div>
                <el-icon><ArrowRight /></el-icon>
              </a>
              <a href="messages.html" class="menu-item">
                <span class="icon">💬</span>
                <div class="info"><h4>消息</h4><p>查看会话消息</p></div>
                <el-icon><ArrowRight /></el-icon>
              </a>
              <a href="settings.html" class="menu-item">
                <span class="icon">⚙️</span>
                <div class="info"><h4>账号设置</h4><p>修改个人资料与密码</p></div>
                <el-icon><ArrowRight /></el-icon>
              </a>
            </div>
          </div>

          <!-- 右侧最近动态 -->
          <div style="background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
            <div style="padding:20px 24px;border-bottom:1px solid #f2f3f5;font-weight:600;">最近动态</div>
            <div class="activity-card">
              <div>你发布了「出闲置教材《软件工程导论》」</div>
              <div class="time">10 分钟前</div>
            </div>
            <div class="activity-card">
              <div>张三收藏了你的发布「出闲置教材」</div>
              <div class="time">1 小时前</div>
            </div>
            <div class="activity-card">
              <div>你和张三完成了交易「软件工程导论」</div>
              <div class="time">2 小时前</div>
            </div>
            <div class="activity-card">
              <div>你的发布「拾到校园卡一张」被浏览 56 次</div>
              <div class="time">昨天</div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="footer"><p>校园轻集市 · 高保真原型 · 仅供教学演示</p></div>
  </div>
  <script>
    const { createApp, ref } = Vue
    const app = createApp({
      setup() {
        const keyword = ref('')
        const goPublish = () => { window.location.href = 'publish.html' }
        return { keyword, goPublish }
      }
    })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>
