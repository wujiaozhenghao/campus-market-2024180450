<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 管理首页</title>
  <link href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css">
  <style>
    .stat-card { padding:24px; border-radius:12px; background:#fff; box-shadow:0 2px 12px rgba(0,0,0,0.06); display:flex; align-items:center; gap:16px; }
    .stat-card .icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; }
    .stat-card .info h3 { font-size:28px; font-weight:700; }
    .stat-card .info p { font-size:13px; color:#86909c; }
  </style>
</head>
<body>
  <div id="app">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div style="padding:0 24px 24px;border-bottom:1px solid #e5e6eb;margin-bottom:16px;">
          <h2 style="font-size:18px;font-weight:700;color:#2d8cf0;">校园轻集市</h2>
          <p style="font-size:12px;color:#86909c;">管理后台</p>
        </div>
        <el-menu default-active="1">
          <el-menu-item index="1" @click="goDashboard"><el-icon><DataBoard /></el-icon>数据概览</el-menu-item>
          <el-menu-item index="2" @click="goReview"><el-icon><Finished /></el-icon>信息审核</el-menu-item>
          <el-menu-item index="3"><el-icon><User /></el-icon>用户管理</el-menu-item>
          <el-menu-item index="4"><el-icon><Setting /></el-icon>系统设置</el-menu-item>
          <el-menu-item index="5" @click="goHome"><el-icon><HomeFilled /></el-icon>返回前台</el-menu-item>
        </el-menu>
      </aside>
      <main class="admin-main">
        <div class="admin-header">
          <h2 style="font-size:20px;font-weight:700;">数据概览</h2>
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:13px;color:#86909c;">管理员</span>
            <el-avatar :size="32" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop&crop=face"></el-avatar>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
          <div class="stat-card">
            <div class="icon" style="background:#e8f3ff;"><span style="color:#2d8cf0;">📋</span></div>
            <div class="info"><h3>156</h3><p>今日新增信息</p></div>
          </div>
          <div class="stat-card">
            <div class="icon" style="background:#fff3e8;"><span style="color:#ff9a2e;">⏳</span></div>
            <div class="info"><h3>23</h3><p>待审核信息</p></div>
          </div>
          <div class="stat-card">
            <div class="icon" style="background:#e8f8f0;"><span style="color:#00b578;">👥</span></div>
            <div class="info"><h3>1,280</h3><p>注册用户</p></div>
          </div>
          <div class="stat-card">
            <div class="icon" style="background:#ffece8;"><span style="color:#f53f3f;">🚩</span></div>
            <div class="info"><h3>5</h3><p>待处理举报</p></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">
          <div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
            <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">最近审核记录</h3>
            <el-table :data="reviewLogs" style="width:100%" size="small">
              <el-table-column prop="title" label="信息标题"></el-table-column>
              <el-table-column prop="type" label="类型" width="100"></el-table-column>
              <el-table-column prop="status" label="状态" width="100">
                <template #default="{row}"><el-tag :type="row.status === '通过' ? 'success' : row.status === '驳回' ? 'danger' : 'warning'" size="small">{{ row.status }}</el-tag></template>
              </el-table-column>
              <el-table-column prop="time" label="时间" width="120"></el-table-column>
            </el-table>
          </div>
          <div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
            <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">快捷操作</h3>
            <div style="display:flex;flex-direction:column;gap:12px;">
              <el-button type="primary" @click="goReview">去审核 ({{ 23 }})</el-button>
              <el-button>查看举报</el-button>
              <el-button>用户管理</el-button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script>
    const { createApp, ref } = Vue
    const app = createApp({
      setup() {
        const reviewLogs = ref([
          { title: '出闲置教材《软件工程导论》', type: '二手', status: '通过', time: '10 分钟前' },
          { title: '拾到校园卡一张', type: '失物', status: '待审核', time: '25 分钟前' },
          { title: '求帮取快递到 6 栋宿舍', type: '跑腿', status: '通过', time: '1 小时前' },
          { title: '拼奶茶还差 2 人', type: '拼单', status: '驳回', time: '2 小时前' },
          { title: '出二手显示器戴尔24寸', type: '二手', status: '待审核', time: '3 小时前' },
        ])
        const goDashboard = () => { window.location.href = 'admin-dashboard.html' }
        const goReview = () => { window.location.href = 'admin-review.html' }
        const goHome = () => { window.location.href = 'home.html' }
        return { reviewLogs, goDashboard, goReview, goHome }
      }
    })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>
